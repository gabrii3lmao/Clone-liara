name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ] # Executa o deploy sempre que houver push na branch main

# Dá permissões para o token do GitHub Actions publicar no Pages
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build Astro
    runs-on: ubuntu-latest
    steps:
      - name: Checkout seu repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.15.0
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Build do Astro
        run: npm run build

      - name: Upload do artefato
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    name: Publicar no GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy para o GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4